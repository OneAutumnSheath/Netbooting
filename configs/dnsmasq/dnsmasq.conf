# =============================================================================
# dnsmasq.conf – DHCP + TFTP + PXE für NetBoot Lab
# =============================================================================
# Server: 10.0.0.2 (netboot-server)
# Netzwerk: 10.0.0.0/24 (vmbr1, isoliertes Lab-Netz)
# =============================================================================

# -----------------------------------------------------------------------------
# Allgemein
# -----------------------------------------------------------------------------
# Nur auf dem Lab-Interface lauschen
interface=ens18
bind-interfaces

# Kein DNS – wir nutzen OPNsense als DNS-Server
port=0

# Logging für Debugging
log-dhcp
log-facility=/var/log/dnsmasq.log

# -----------------------------------------------------------------------------
# DHCP
# -----------------------------------------------------------------------------
dhcp-range=10.0.0.100,10.0.0.200,255.255.255.0,12h
dhcp-option=option:router,10.0.0.1
dhcp-option=option:dns-server,10.0.0.1
dhcp-option=option:domain-name,lab.local

# NetBoot-Server IP für Clients
dhcp-option=option:tftp-server,10.0.0.2

# Statische Zuweisungen (optional, für bekannte Test-Clients)
# dhcp-host=BC:24:11:AA:BB:CC,pxe-client-1,10.0.0.110

# -----------------------------------------------------------------------------
# TFTP
# -----------------------------------------------------------------------------
enable-tftp
tftp-root=/srv/netboot/tftp
tftp-secure

# -----------------------------------------------------------------------------
# PXE Boot
# -----------------------------------------------------------------------------
# Legacy BIOS Clients bekommen pxelinux.0
dhcp-boot=pxelinux.0,,10.0.0.2

# Architektur-basierte Auswahl (Legacy BIOS vs UEFI)
# Tag 0 = Intel x86PC (Legacy BIOS)
# Tag 7 = EFI BC (UEFI x64)
# Tag 9 = EFI x86-64
dhcp-match=set:bios,option:client-arch,0
dhcp-match=set:efi-x64,option:client-arch,7
dhcp-match=set:efi-x64,option:client-arch,9

# Bootloader je nach Architektur
dhcp-boot=tag:bios,pxelinux.0,,10.0.0.2
dhcp-boot=tag:efi-x64,grubnetx64.efi,,10.0.0.2

# PXE-Menü Prompt (Wartezeit in Sekunden)
pxe-prompt="NetBoot Lab - Druecke F8 fuer Boot-Menue", 5

# PXE Boot-Service
pxe-service=x86PC,"Debian 12 Diskless (BIOS)",pxelinux
pxe-service=x86-64_EFI,"Debian 12 Diskless (UEFI)",grubnetx64
