# =============================================================================
# dnsmasq.conf – DHCP + TFTP + PXE für NetBoot Lab
# =============================================================================
# Server: 10.10.0.2 (netboot-server)
# Netzwerk: 10.10.0.0/24 (vmbr1, isoliertes Lab-Netz)
# =============================================================================

# -----------------------------------------------------------------------------
# Allgemein
# -----------------------------------------------------------------------------
# Nur auf dem Lab-Interface lauschen
interface=ens18
bind-interfaces

# Kein DNS – wir nutzen OPNsense als DNS-Server
port=0

# Logging für Debugging
log-dhcp
log-facility=/var/log/dnsmasq.log

# -----------------------------------------------------------------------------
# DHCP
# -----------------------------------------------------------------------------
dhcp-range=10.10.0.100,10.10.0.200,255.255.255.0,12h
dhcp-option=option:router,10.10.0.1
dhcp-option=option:dns-server,10.10.0.1
dhcp-option=option:domain-name,lab.local

# NetBoot-Server IP für Clients
dhcp-option=option:tftp-server,10.10.0.2

# Statische Zuweisungen (optional, für bekannte Test-Clients)
# dhcp-host=BC:24:11:AA:BB:CC,pxe-client-1,10.10.0.110

# -----------------------------------------------------------------------------
# TFTP
# -----------------------------------------------------------------------------
enable-tftp
tftp-root=/srv/netboot/tftp
tftp-secure

# -----------------------------------------------------------------------------
# PXE Boot (iPXE)
# -----------------------------------------------------------------------------
# iPXE-Clients erkennen via Option 175 (iPXE-spezifisch)
dhcp-match=set:ipxe,175

# iPXE-Clients bekommen das iPXE-Script
dhcp-boot=tag:ipxe,boot.ipxe,,10.10.0.2

# Legacy-PXE-Clients (ohne iPXE) bekommen undionly.kpxe zum Chainloaden
dhcp-boot=tag:!ipxe,undionly.kpxe,,10.10.0.2

# NFS Root-Pfad fuer Kernel (Option 17)
dhcp-option=17,10.10.0.2:/srv/netboot/rootfs
