# =============================================================================
# netboot.conf – nginx fuer WinPE-Files + Auth-Backend Proxy
# =============================================================================
# Server: 10.10.0.2 (netboot-server)
# Pfad auf dem Server: /etc/nginx/sites-available/netboot
# Symlink: /etc/nginx/sites-enabled/netboot
# =============================================================================

server {
    listen 80;
    server_name netboot.lab.local 10.10.0.2;

    # --- Statische WinPE-Dateien ---
    # iPXE laedt wimboot, BCD, boot.sdi und boot.wim via HTTP
    location /boot/ {
        alias /srv/netboot/tftp/winpe/;
        autoindex off;

        # Grosse Dateien (boot.wim bis 500 MB)
        client_max_body_size 0;

        # Caching deaktivieren (Lab)
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }

    # --- Auth-Backend (Flask) ---
    # iPXE sendet Basic-Auth, nginx leitet an Flask weiter
    location /boot/auth/ {
        proxy_pass http://127.0.0.1:5000/boot/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        # Timeout fuer LDAP-Abfragen
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # --- Health-Check ---
    location /health {
        proxy_pass http://127.0.0.1:5000/health;
    }

    # --- Default: 404 ---
    location / {
        return 404 "NetBoot-Server: Nur /boot/ Pfade verfuegbar.\n";
    }
}
