# =============================================================================
# netboot.conf – nginx fuer Support-Tools (Laravel + Boot-Files)
# =============================================================================
# Server: 10.10.0.2 (netboot-server)
# Pfad auf dem Server: /etc/nginx/sites-available/netboot
# Symlink: /etc/nginx/sites-enabled/netboot
#
# Komponenten:
#   - Laravel Dashboard + Auth + Session-API (PHP-FPM)
#   - Statische Boot-Files: WinPE, HBCD, Kiosk-Linux
# =============================================================================

server {
    listen 80;
    server_name netboot.lab.local 10.10.0.2;

    # --- Laravel (Dashboard + Auth + Sessions + Health) ---
    root /opt/nabe-web/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_connect_timeout 10s;
        fastcgi_read_timeout 30s;
    }

    # --- Statische Boot-Files: WinPE ---
    location /boot/winpe/ {
        alias /srv/netboot/tftp/winpe/;
        autoindex off;
        client_max_body_size 0;
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }

    # --- Statische Boot-Files: HBCD ---
    location /boot/hbcd/ {
        alias /srv/netboot/tftp/hbcd/;
        autoindex off;
        client_max_body_size 0;
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }

    # --- Statische Boot-Files: Kiosk-Linux ---
    location /boot/kiosk-linux/ {
        alias /srv/netboot/kiosk-linux/;
        autoindex off;
        client_max_body_size 0;
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }

    # Deny dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }
}
