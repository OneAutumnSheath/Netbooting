# =============================================================================
# smb.conf – Samba Share fuer Windows 11 Installationsdateien
# =============================================================================
# Server: 10.10.0.2 (netboot-server)
# Pfad auf dem Server: /etc/samba/smb.conf
# =============================================================================
# WinPE verbindet sich zu \\10.10.0.2\win11 um setup.exe zu starten.
# Read-only, Gastzugriff (Lab-Umgebung).
# =============================================================================

[global]
    workgroup = LAB
    server string = NABE NetBoot Server
    server role = standalone server

    # Nur Lab-Netzwerk
    interfaces = 10.10.0.0/24
    bind interfaces only = yes

    # Gastzugriff erlauben (Lab!)
    map to guest = Bad User
    guest account = nobody

    # Logging
    log file = /var/log/samba/log.%m
    max log size = 1000
    log level = 1

    # Performance
    socket options = TCP_NODELAY IPTOS_LOWDELAY

    # SMB-Versionen (WinPE unterstuetzt SMB2+)
    server min protocol = SMB2
    server max protocol = SMB3

[win11]
    comment = Windows 11 Installationsdateien
    path = /srv/netboot/win11
    browseable = yes
    read only = yes
    guest ok = yes
    force user = nobody
    force group = nogroup
