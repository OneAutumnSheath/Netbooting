# =============================================================================
# krb5.conf – Kerberos-Konfiguration fuer AD-Authentifizierung
# =============================================================================
# Server: 10.10.0.2 (netboot-server)
# Pfad auf dem Server: /etc/krb5.conf
#
# Wird benoetigt fuer:
#   - kinit: TGT holen (Laravel Auth via Process::run)
#   - ldapsearch -Y GSSAPI: Gruppen abfragen mit Kerberos-Ticket
#
# Voraussetzung: krb5-user, ldap-utils, libsasl2-modules-gssapi-mit
# =============================================================================

[libdefaults]
    default_realm = LAB.LOCAL
    dns_lookup_realm = false
    dns_lookup_kdc = false
    forwardable = true

[realms]
    LAB.LOCAL = {
        kdc = 10.10.0.3
        admin_server = 10.10.0.3
    }

[domain_realm]
    .lab.local = LAB.LOCAL
    lab.local = LAB.LOCAL
